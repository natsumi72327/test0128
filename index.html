<body>
<section class="home" aria-label="ホーム"><div class="home-panel"><div class="home-hero"><img class="home-girl" src="hero.png" alt="頭のなかのメモ帳達"><div class="home-title" aria-hidden="true"></div></div><div class="choice-grid"><button class="choice" type="button" data-enter="symptoms"><strong>症状別</strong><span>腰痛、肩こり、膝痛など、患者さんの訴えから治療法を探す引き出し。</span></button><button class="choice" type="button" data-enter="concepts"><strong>概念別</strong><span>腎虚、肝虚、瘀血など、考え方や病態概念から知識をまとめる引き出し。</span></button></div></div></section>
<div class="app">

  </main>
</div>
<script>
(function(){
const storageKey='acupunctureKnowledgeDrawer.v1';const syncUrlKey='acupunctureKnowledgeDrawer.syncUrl.v1';const today=new Date().toISOString().slice(0,10);const styleOptions=['中医学','日本鍼灸','現代鍼灸','整動鍼','杉山先生','その他'];const defaultSources=['図解経絡治療講義','鍼灸いろは(各論)','鍼灸いろは(総論)'];const hiddenSources=['初期サンプル'];const id=()=>crypto.randomUUID();
const modeInfo={symptoms:{title:'症状別',single:'症状',add:'新しい症状名',search:'症状・流派・キーワードで検索'},concepts:{title:'概念別',single:'概念',add:'新しい概念名',search:'概念・流派・キーワードで検索'}};
const sampleData={currentMode:null,sourceOptions:[...defaultSources],symptoms:[{id:id(),name:'腰痛',createdAt:today,methods:[{id:id(),name:'局所所見から組み立てる腰痛メモ',style:'現代鍼灸',source:'図解経絡治療講義',memo:'ここに研修・書籍・臨床で得た内容をまとめる。'}]},{id:id(),name:'肩こり',createdAt:today,methods:[{id:id(),name:'頚肩部の見立てメモ',style:'日本鍼灸',source:'鍼灸いろは(各論)',memo:'治療の考え方、使いやすい場面、患者説明などを自由に記録。'}]}],concepts:[{id:id(),name:'腎虚',createdAt:today,methods:[]},{id:id(),name:'肝虚',createdAt:today,methods:[]}],selectedSymptomId:null,selectedConceptId:null,selectedStyle:'すべて'};sampleData.selectedSymptomId=sampleData.symptoms[0].id;sampleData.selectedConceptId=sampleData.concepts[0].id;
let state=load();let openMethodIds=new Set();let cloudSaveTimer=null;let syncingFromCloud=false;const $=x=>document.getElementById(x);const els={homeBtn:$('homeBtn'),modeHeading:$('modeHeading'),modeSub:$('modeSub'),syncUrlInput:$('syncUrlInput'),cloudLoadBtn:$('cloudLoadBtn'),cloudSaveBtn:$('cloudSaveBtn'),syncStatus:$('syncStatus'),searchInput:$('searchInput'),newItemInput:$('newItemInput'),addItemBtn:$('addItemBtn'),itemList:$('itemList'),itemTitle:$('itemTitle'),itemMeta:$('itemMeta'),summary:$('summary'),tabs:$('tabs'),cards:$('cards'),form:$('methodForm'),formTitle:$('formTitle'),methodId:$('methodId'),methodName:$('methodName'),methodStyle:$('methodStyle'),methodSourceSelect:$('methodSourceSelect'),methodSourceCustom:$('methodSourceCustom'),methodMemo:$('methodMemo'),newItemBtn:$('newItemBtn'),exportBtn:$('exportBtn'),importBtn:$('importBtn'),importFile:$('importFile'),sampleBtn:$('sampleBtn'),editItemBtn:$('editItemBtn'),deleteItemBtn:$('deleteItemBtn'),clearFormBtn:$('clearFormBtn')};
function normalizeMethod(m){return {id:m.id||id(),name:m.name||'',style:styleOptions.includes(m.style)?m.style:(m.style||'その他'),source:m.source||'',memo:m.memo||m.points||m.pattern||'',updated:m.updated||today}}
function normalizeGroup(g){return {...g,id:g.id||id(),name:g.name||'未分類',createdAt:g.createdAt||today,methods:(g.methods||[]).map(normalizeMethod)}}
function normalizeState(raw){const next={...sampleData,...raw};next.symptoms=(next.symptoms||[]).map(normalizeGroup);next.concepts=(next.concepts&&next.concepts.length?next.concepts:sampleData.concepts).map(normalizeGroup);const learned=[...(next.sourceOptions||[]),...next.symptoms.flatMap(s=>s.methods.map(m=>m.source).filter(Boolean)),...next.concepts.flatMap(s=>s.methods.map(m=>m.source).filter(Boolean))];next.sourceOptions=[...new Set([...defaultSources,...learned])].filter(x=>x&&!hiddenSources.includes(x));next.selectedSymptomId=next.selectedSymptomId||next.symptoms[0]?.id;next.selectedConceptId=next.selectedConceptId||next.concepts[0]?.id;next.currentMode=next.currentMode||null;next.selectedStyle=next.selectedStyle||'すべて';return next}
function load(){const saved=localStorage.getItem(storageKey);if(!saved)return normalizeState(sampleData);try{return normalizeState(JSON.parse(saved))}catch{return normalizeState(sampleData)}}function persist(){localStorage.setItem(storageKey,JSON.stringify(state,null,2))}function syncUrl(){return els.syncUrlInput.value.trim()}function setSyncStatus(message){els.syncStatus.textContent=message}function saveSyncUrl(){localStorage.setItem(syncUrlKey,syncUrl())}function scheduleCloudSave(){if(syncingFromCloud||!syncUrl())return;clearTimeout(cloudSaveTimer);cloudSaveTimer=setTimeout(()=>cloudSave(false),900)}async function cloudSave(showDone=true){const url=syncUrl();if(!url){setSyncStatus('同期URLを入れてください');els.syncUrlInput.focus();return}saveSyncUrl();setSyncStatus('cloudへ保存中...');try{await fetch(url,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify({action:'save',data:state,savedAt:new Date().toISOString()})});setSyncStatus(showDone?'cloudへ保存しました':'自動保存しました')}catch(err){setSyncStatus('保存できませんでした: '+err.message)}}function cloudLoad(){const url=syncUrl();if(!url){setSyncStatus('同期URLを入れてください');els.syncUrlInput.focus();return}saveSyncUrl();setSyncStatus('cloudから読込中...');const callback='drawerSyncCallback_'+Date.now();window[callback]=payload=>{try{if(!payload||payload.ok===false)throw new Error(payload?.error||'データを読めませんでした');syncingFromCloud=true;state=normalizeState(payload.data||{});openMethodIds.clear();clearForm();render();syncingFromCloud=false;setSyncStatus('cloudから読み込みました')}catch(err){setSyncStatus('読込できませんでした: '+err.message)}finally{delete window[callback];script.remove()}};const script=document.createElement('script');script.src=url+(url.includes('?')?'&':'?')+'action=load&callback='+encodeURIComponent(callback)+'&t='+Date.now();script.onerror=()=>{setSyncStatus('読込できませんでした。URLと公開設定を確認してください');delete window[callback];script.remove()};document.body.appendChild(script)}
function mode(){return state.currentMode||'symptoms'}function collection(){return state[mode()]}function selectedIdKey(){return mode()==='concepts'?'selectedConceptId':'selectedSymptomId'}function selectedItem(){return collection().find(x=>x.id===state[selectedIdKey()])||null}
function esc(v){return String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]))}function countStyles(s){return new Set(s.methods.map(x=>x.style).filter(Boolean)).size}function matchesSearch(item,q){if(!q)return true;const text=[item.name,...item.methods.flatMap(m=>[m.name,m.style,m.source,m.memo])].join(' ').toLowerCase();return text.includes(q.toLowerCase())}
function renderOptions(){const currentStyle=els.methodStyle.value;const currentSource=els.methodSourceSelect.value;els.methodStyle.innerHTML=styleOptions.map(x=>'<option>'+esc(x)+'</option>').join('');if(currentStyle)els.methodStyle.value=currentStyle;els.methodSourceSelect.innerHTML=state.sourceOptions.map(x=>'<option value="'+esc(x)+'">'+esc(x)+'</option>').join('')+'<option value="__custom__">その他・新規入力</option>';if(currentSource&&state.sourceOptions.includes(currentSource))els.methodSourceSelect.value=currentSource;updateSourceCustom()}
function enterMode(nextMode){state.currentMode=nextMode;state[selectedIdKey()]=null;openMethodIds.clear();clearForm();document.body.classList.add('in-app');render()}function showHome(){state.currentMode=null;persist();document.body.classList.remove('in-app')}
function render(){if(!state.currentMode){persist();document.body.classList.remove('in-app');return}document.body.classList.add('in-app');const info=modeInfo[mode()];if(!collection().length)collection().push({id:id(),name:'未分類',createdAt:today,methods:[]});renderOptions();persist();els.modeHeading.textContent=''+info.title;els.modeSub.textContent=info.title;els.searchInput.placeholder=info.search;els.newItemInput.placeholder=info.add;els.newItemBtn.textContent='＋ '+info.single;els.editItemBtn.textContent=info.single+'名を編集';const q=els.searchInput.value.trim();const filtered=collection().filter(s=>matchesSearch(s,q));const cur=selectedItem();els.itemList.innerHTML=filtered.map(s=>'<button class="item" type="button" data-item-id="'+s.id+'" aria-current="'+(cur&&s.id===cur.id)+'"><strong>'+esc(s.name)+'</strong><span class="meta">'+s.methods.length+'件 / '+countStyles(s)+'分類</span></button>').join('')||'<div class="empty">該当する'+info.single+'がありません</div>';if(!cur){els.itemTitle.textContent=info.title;els.itemMeta.textContent='左の一覧から'+info.single+'名を選んでください';els.summary.innerHTML=[['メモ',0],['分類',0],['出典',0]].map(([l,v])=>'<div class="stat"><b>'+v+'</b><span class="meta">'+l+'</span></div>').join('');els.tabs.innerHTML='';els.cards.innerHTML='<div class="empty">左の一覧から'+info.single+'名を選ぶと、メモが開きます。</div>';return}const styles=['すべて',...new Set(cur.methods.map(m=>m.style).filter(Boolean))];if(!styles.includes(state.selectedStyle))state.selectedStyle='すべて';const visible=cur.methods.filter(m=>{const okStyle=state.selectedStyle==='すべて'||m.style===state.selectedStyle;const okQuery=matchesSearch({...cur,methods:[m]},q)||cur.name.toLowerCase().includes(q.toLowerCase());return okStyle&&okQuery});els.itemTitle.textContent=cur.name;els.itemMeta.textContent=cur.methods.length+'件のメモ / 作成日 '+(cur.createdAt||today);const sourceCount=new Set(cur.methods.map(x=>x.source).filter(Boolean)).size;els.summary.innerHTML=[['メモ',cur.methods.length],['分類',countStyles(cur)],['出典',sourceCount]].map(([l,v])=>'<div class="stat"><b>'+v+'</b><span class="meta">'+l+'</span></div>').join('');els.tabs.innerHTML=styles.map(st=>'<button class="tab" type="button" role="tab" data-style="'+esc(st)+'" aria-selected="'+(st===state.selectedStyle)+'">'+esc(st)+'</button>').join('');els.cards.innerHTML=visible.map(card).join('')||'<div class="empty">この条件のメモはまだありません。右側から追加できます。</div>'}
function card(m){const open=openMethodIds.has(m.id);return '<article class="card '+(open?'open':'')+'"><div class="card-head"><button class="method-toggle" type="button" data-toggle-id="'+m.id+'" aria-expanded="'+open+'"><h3>'+esc(m.name)+'</h3><div class="badges">'+(m.style?'<span class="badge style">'+esc(m.style)+'</span>':'')+(m.source?'<span class="badge source">'+esc(m.source)+'</span>':'')+'</div></button><div class="actions"><button class="btn icon" type="button" title="編集" data-edit-id="'+m.id+'">✎</button><button class="btn icon danger" type="button" title="削除" data-delete-id="'+m.id+'">×</button></div></div><div class="method-detail"><b>メモ</b><p>'+esc(m.memo||'未記入')+'</p></div></article>'}
function clearForm(){if(!els.methodStyle)return;els.formTitle.textContent='メモを追加';els.methodId.value='';els.methodName.value='';els.methodStyle.value='中医学';els.methodSourceSelect.value=state.sourceOptions[0]||'';els.methodSourceCustom.value='';updateSourceCustom();els.methodMemo.value=''}
function fillForm(m){els.formTitle.textContent='メモを編集';els.methodId.value=m.id;els.methodName.value=m.name||'';els.methodStyle.value=styleOptions.includes(m.style)?m.style:'その他';if(m.source&&state.sourceOptions.includes(m.source)){els.methodSourceSelect.value=m.source;els.methodSourceCustom.value=''}else{els.methodSourceSelect.value='__custom__';els.methodSourceCustom.value=m.source||''}updateSourceCustom();els.methodMemo.value=m.memo||'';els.methodName.focus()}
function updateSourceCustom(){if(!els.methodSourceSelect)return;const custom=els.methodSourceSelect.value==='__custom__';els.methodSourceCustom.style.display=custom?'block':'none'}function currentSource(){return els.methodSourceSelect.value==='__custom__'?els.methodSourceCustom.value.trim():els.methodSourceSelect.value}function rememberSource(src){const source=src.trim();if(source&&!hiddenSources.includes(source)&&!state.sourceOptions.includes(source))state.sourceOptions.push(source)}
function addItemFromInput(){const name=els.newItemInput.value.trim();if(!name){els.newItemInput.focus();return}const item={id:id(),name,createdAt:today,methods:[]};collection().unshift(item);state[selectedIdKey()]=item.id;state.selectedStyle='すべて';openMethodIds.clear();els.newItemInput.value='';scheduleCloudSave();clearForm();render()}
document.querySelectorAll('[data-enter]').forEach(btn=>btn.addEventListener('click',()=>enterMode(btn.dataset.enter)));els.homeBtn.addEventListener('click',showHome);els.itemList.addEventListener('click',e=>{const b=e.target.closest('[data-item-id]');if(!b)return;state[selectedIdKey()]=b.dataset.itemId;state.selectedStyle='すべて';openMethodIds.clear();clearForm();render()});els.tabs.addEventListener('click',e=>{const b=e.target.closest('[data-style]');if(!b)return;state.selectedStyle=b.dataset.style;render()});els.cards.addEventListener('click',e=>{const toggle=e.target.closest('[data-toggle-id]');const edit=e.target.closest('[data-edit-id]');const del=e.target.closest('[data-delete-id]');const cur=selectedItem();if(toggle){const mid=toggle.dataset.toggleId;if(openMethodIds.has(mid))openMethodIds.delete(mid);else openMethodIds.add(mid);render();return}if(edit){const m=cur.methods.find(x=>x.id===edit.dataset.editId);if(m)fillForm(m)}if(del){const m=cur.methods.find(x=>x.id===del.dataset.deleteId);if(m&&confirm('「'+m.name+'」を削除しますか？')){cur.methods=cur.methods.filter(x=>x.id!==m.id);openMethodIds.delete(m.id);scheduleCloudSave();clearForm();render()}}});
els.syncUrlInput.value=localStorage.getItem(syncUrlKey)||'';setSyncStatus(syncUrl()?'同期URLあり':'未設定');els.syncUrlInput.addEventListener('change',()=>{saveSyncUrl();setSyncStatus(syncUrl()?'同期URLを保存しました':'未設定')});els.cloudLoadBtn.addEventListener('click',cloudLoad);els.cloudSaveBtn.addEventListener('click',()=>cloudSave(true));els.form.addEventListener('submit',e=>{e.preventDefault();const cur=selectedItem();if(!cur){alert('左の一覧から保存先を選んでください。');return}const m={id:els.methodId.value||id(),name:els.methodName.value.trim(),style:els.methodStyle.value,source:currentSource(),memo:els.methodMemo.value.trim(),updated:today};if(!m.name)return;rememberSource(m.source);const i=cur.methods.findIndex(x=>x.id===m.id);if(i>=0)cur.methods[i]=m;else cur.methods.unshift(m);scheduleCloudSave();clearForm();render()});els.methodSourceSelect.addEventListener('change',updateSourceCustom);els.searchInput.addEventListener('input',render);els.clearFormBtn.addEventListener('click',clearForm);els.newItemBtn.addEventListener('click',()=>els.newItemInput.focus());els.addItemBtn.addEventListener('click',addItemFromInput);els.newItemInput.addEventListener('keydown',e=>{if(e.key==='Enter')addItemFromInput()});
els.editItemBtn.addEventListener('click',()=>{const cur=selectedItem();const info=modeInfo[mode()];const name=prompt(info.single+'名を編集',cur.name);if(!name?.trim())return;cur.name=name.trim();scheduleCloudSave();render()});els.deleteItemBtn.addEventListener('click',()=>{const cur=selectedItem();const info=modeInfo[mode()];if(collection().length===1){alert('最後の'+info.single+'は削除できません。');return}if(!confirm('「'+cur.name+'」を削除しますか？'))return;state[mode()]=collection().filter(x=>x.id!==cur.id);state[selectedIdKey()]=null;openMethodIds.clear();scheduleCloudSave();clearForm();render()});
els.exportBtn.addEventListener('click',()=>{const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='頭のなかのメモ帳達-'+today+'.json';a.click();URL.revokeObjectURL(url)});els.importBtn.addEventListener('click',()=>els.importFile.click());els.importFile.addEventListener('change',async()=>{const file=els.importFile.files[0];if(!file)return;try{state=normalizeState(JSON.parse(await file.text()));openMethodIds.clear();scheduleCloudSave();clearForm();render()}catch{alert('読み込めるJSONではありません。')}finally{els.importFile.value=''}});els.sampleBtn.addEventListener('click',()=>{if(!confirm('現在の内容を雛形データに置き換えますか？先に書き出ししておくと安心です。'))return;const keepMode=state.currentMode;state=normalizeState(JSON.parse(JSON.stringify(sampleData)));state.currentMode=keepMode;openMethodIds.clear();scheduleCloudSave();clearForm();render()});
render();
})();
